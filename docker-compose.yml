services:
  mysql:
    image: mysql:8
    container_name: mundial-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mundial_db
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7
    container_name: mundial-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  mysql_data:
